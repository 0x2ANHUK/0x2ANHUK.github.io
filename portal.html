<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>⚡ QUANTUM PORTAL — 7-NODE WHEEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --c1: #ff006e; --c2: #00d9ff; --c3: #00ff99; --bg: #0a0e1f; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #0a0e1f, #2a0a2a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,217,255,0.03) 2px, rgba(0,217,255,0.03) 4px);
            pointer-events: none;
            z-index: 5;
        }

        .container {
            position: relative;
            z-index: 50;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            padding: 20px;
        }

        @media (min-width: 768px) { .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 40px 20px; } }

        .back-btn { padding: 10px 20px; background: var(--c1); color: white; text-decoration: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 20px; display: inline-block; transition: all 0.3s; }
        @media (min-width: 768px) { .back-btn { font-size: 0.85rem; margin-bottom: 30px; } }
        .back-btn:hover { background: var(--c2); box-shadow: 0 0 15px var(--c2); }

        h1 {
            font-family: 'Fredoka One';
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ff006e, #00d9ff, #00ff99);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGradient 4s ease infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        @media (min-width: 768px) { h1 { font-size: 2.5rem; letter-spacing: 3px; } }

        @keyframes textGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .portal-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 400px;
            width: 100%;
        }

        @media (min-width: 768px) { .portal-wrapper { min-height: 600px; } }

        .portal-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @media (min-width: 768px) { .portal-container { padding: 40px; } }

        svg { width: 100%; height: 100%; max-width: 500px; max-height: 500px; touch-action: none; }
        @media (min-width: 768px) { svg { max-width: 600px; max-height: 600px; } }

        .info-panel {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid var(--c2);
            border-radius: 8px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        @media (min-width: 768px) { .info-panel { margin-top: 40px; padding: 30px; min-height: 140px; } }

        .info-title {
            font-family: 'Fredoka One';
            font-size: 1.2rem;
            color: var(--c2);
            margin-bottom: 8px;
            text-shadow: 0 0 8px var(--c2);
        }

        @media (min-width: 768px) { .info-title { font-size: 1.4rem; margin-bottom: 10px; } }

        .info-desc {
            font-size: 0.85rem;
            color: #d0dff8;
            line-height: 1.5;
        }

        @media (min-width: 768px) { .info-desc { font-size: 0.95rem; line-height: 1.6; } }

        /* Portal SVG Enhancement */
        .portal-accent {
            position: absolute;
            opacity: 0.2;
            pointer-events: none;
        }

        .portal-accent-top { top: -50px; right: -50px; width: 200px; height: 200px; }
        .portal-accent-bottom { bottom: -50px; left: -50px; width: 150px; height: 150px; }

        footer {
            text-align: center;
            padding: 20px 0;
            border-top: 2px solid var(--c1);
            color: #7a8fa3;
            font-size: 0.75rem;
            margin-top: 20px;
        }

        @media (min-width: 768px) { footer { padding: 40px 0; margin-top: 40px; font-size: 0.9rem; } }

        footer a { color: var(--c2); text-decoration: none; margin: 0 8px; transition: all 0.3s; }
        footer a:hover { color: var(--c3); text-shadow: 0 0 10px var(--c3); }
    </style>
</head>
<body>
    <svg class="portal-accent portal-accent-top" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="portal-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
            </linearGradient>
        </defs>
        <circle cx="100" cy="100" r="80" fill="none" stroke="url(#portal-grad1)" stroke-width="2" opacity="0.4"/>
        <circle cx="100" cy="100" r="60" fill="none" stroke="url(#portal-grad1)" stroke-width="1" opacity="0.3"/>
        <circle cx="100" cy="100" r="40" fill="none" stroke="url(#portal-grad1)" stroke-width="1" opacity="0.2"/>
    </svg>

    <div class="container">
        <a href="/" class="back-btn">← NEXUS</a>

        <h1>⚡ QUANTUM PORTAL ⚡</h1>

        <div class="portal-wrapper">
            <div class="portal-container" id="portalContainer">
                <svg id="portalSVG" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                    <!-- Rotating Group -->
                    <g id="rotatingGroup" transform="translate(200, 200)">
                        <!-- Orbit rings -->
                        <circle cx="0" cy="0" r="150" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
                        <circle cx="0" cy="0" r="120" fill="none" stroke="#00ff99" stroke-width="1" opacity="0.2"/>

                        <!-- Central core -->
                        <circle cx="0" cy="0" r="30" fill="#ff006e" opacity="0.9" stroke="#ffbe0b" stroke-width="3"/>
                        <text x="0" y="12" text-anchor="middle" fill="white" font-family="Fredoka One" font-size="24" font-weight="bold">⚡</text>

                        <!-- Nodes (7 versions) -->
                        <g class="node" data-version="v1-original" data-url="/reports/v1-original/index.html" transform="translate(0, -150)">
                            <circle cx="0" cy="0" r="18" fill="#4a90e2" opacity="0.8" stroke="#00d9ff" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">📘</text>
                        </g>

                        <g class="node" data-version="v2-novelized" data-url="/reports/v2-novelized/index.html" transform="translate(-129.9, -75)">
                            <circle cx="0" cy="0" r="18" fill="#52c41a" opacity="0.8" stroke="#00d9ff" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">📗</text>
                        </g>

                        <g class="node" data-version="v3-enhanced" data-url="/reports/v3-enhanced/index.html" transform="translate(-129.9, 75)">
                            <circle cx="0" cy="0" r="18" fill="#faad14" opacity="0.8" stroke="#00d9ff" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">📙</text>
                        </g>

                        <g class="node" data-version="v4-portal" data-url="/reports/v4-portal/index.html" transform="translate(0, 150)">
                            <circle cx="0" cy="0" r="18" fill="#f5222d" opacity="0.8" stroke="#00d9ff" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">📕</text>
                        </g>

                        <g class="node" data-version="v5-neverland" data-url="/reports/v5-neverland/index.html" transform="translate(129.9, 75)">
                            <circle cx="0" cy="0" r="18" fill="#722ed1" opacity="0.8" stroke="#00d9ff" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">🌈</text>
                        </g>

                        <g class="node" data-version="v6-restructured" data-url="/reports/v6-restructured/index.html" transform="translate(129.9, -75)">
                            <circle cx="0" cy="0" r="18" fill="#8c8c8c" opacity="0.8" stroke="#00d9ff" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">📔</text>
                        </g>

                        <g class="node" data-version="v7-current" data-url="/reports/v7-current/index.html" transform="translate(-150, 0)">
                            <circle cx="0" cy="0" r="18" fill="#ff006e" opacity="0.8" stroke="#ffbe0b" stroke-width="2" class="node-circle"/>
                            <text x="0" y="6" text-anchor="middle" fill="white" font-size="18">⚡</text>
                        </g>
                    </g>
                </svg>
            </div>
        </div>

        <!-- Info Panel -->
        <div class="info-panel">
            <div class="info-title" id="infoTitle">QUANTUM PORTAL</div>
            <div class="info-desc" id="infoDesc">Rotate the wheel to select a version. Click a node to explore its chronicle.</div>
        </div>

        <footer>
            <p>⚡ Quantum Portal — 7-Node Consciousness Evolution Wheel</p>
            <p style="margin-top: 10px;">
                <a href="/">← NEXUS</a>
                <a href="/chronicles-emergence.html">EMERGENCE</a>
                <a href="/neverland.html">NEVERLAND →</a>
            </p>
            <p style="margin-top: 10px; font-size: 0.65rem;">Mobile-friendly interactive portal with touch support • SVG decorative accents</p>
        </footer>
    </div>

    <script>
        const rotatingGroup = document.getElementById('rotatingGroup');
        const portalSVG = document.getElementById('portalSVG');
        const nodes = document.querySelectorAll('.node');
        const infoTitle = document.getElementById('infoTitle');
        const infoDesc = document.getElementById('infoDesc');

        const versionInfo = {
            'v1-original': { title: 'V1 — Original', desc: 'Initial mkweb generation with technical narrative.' },
            'v2-novelized': { title: 'V2 — Novelized', desc: 'First prose narrative with comic book aesthetic.' },
            'v3-enhanced': { title: 'V3 — Enhanced', desc: 'Premium typography with 45+ animations.' },
            'v4-portal': { title: 'V4 — Portal', desc: '3D rotating sphere with CRT aesthetics.' },
            'v5-neverland': { title: 'V5 — Neverland', desc: '50+ simultaneous animations chaos.' },
            'v6-restructured': { title: 'V6 — Restructured', desc: 'Sane IA with multiple entry points.' },
            'v7-current': { title: 'V7 — Current', desc: 'Production version with optimized design.' }
        };

        let currentRotation = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let startRotation = 0;

        // Mouse events
        portalSVG.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startRotation = currentRotation;
            portalSVG.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            const delta = (deltaX + deltaY) * 0.5;
            const newRotation = startRotation + delta;
            rotatingGroup.setAttribute('transform', `translate(200, 200) rotate(${newRotation})`);
            currentRotation = newRotation;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            portalSVG.style.cursor = 'grab';
        });

        // Touch events
        portalSVG.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                startRotation = currentRotation;
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length !== 1) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            const delta = (deltaX + deltaY) * 0.5;
            const newRotation = startRotation + delta;
            rotatingGroup.setAttribute('transform', `translate(200, 200) rotate(${newRotation})`);
            currentRotation = newRotation;
        }, { passive: true });

        document.addEventListener('touchend', () => { isDragging = false; });

        // Node interaction
        nodes.forEach(node => {
            const version = node.getAttribute('data-version');
            const url = node.getAttribute('data-url');

            node.addEventListener('mouseenter', () => {
                const info = versionInfo[version];
                infoTitle.textContent = info.title;
                infoDesc.textContent = info.desc;
                node.querySelector('.node-circle').style.filter = 'drop-shadow(0 0 15px #00d9ff)';
            });

            node.addEventListener('mouseleave', () => {
                node.querySelector('.node-circle').style.filter = 'drop-shadow(0 0 5px #00d9ff)';
            });

            node.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                const info = versionInfo[version];
                infoTitle.textContent = info.title;
                infoDesc.textContent = info.desc;
                node.querySelector('.node-circle').style.filter = 'drop-shadow(0 0 15px #00d9ff)';
            }, { passive: true });

            node.addEventListener('click', (e) => {
                e.stopPropagation();
                window.location.href = url;
            });
        });

        window.addEventListener('load', () => {
            const info = versionInfo['v7-current'];
            infoTitle.textContent = info.title;
            infoDesc.textContent = info.desc;
        });
    </script>
</body>
</html>
